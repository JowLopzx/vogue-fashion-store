<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOGUE | Premium Fashion</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">VOGUE</div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="O que você procura?" oninput="filtrarBusca()">
            <i class="fa-solid fa-magnifying-glass"></i>
        </div>
        <div class="header-actions">
            <button class="icon-btn"><i class="fa-regular fa-user"></i></button>
            <button class="icon-btn" onclick="mostrarCarrinho()">
                <i class="fa-solid fa-bag-shopping"></i>
                <span id="cart-count">0</span>
            </button>
        </div>
    </header>

    <div class="categories-bar">
        <button class="cat-btn active" onclick="filtrarCategoria('all')">Ver Tudo</button>
        <button class="cat-btn" onclick="filtrarCategoria('women\'s clothing')">Feminino</button>
        <button class="cat-btn" onclick="filtrarCategoria('men\'s clothing')">Masculino</button>
        <button class="cat-btn" onclick="filtrarCategoria('jewelery')">Acessórios</button>
    </div>

    <main class="container">
        <div id="produtosContainer" class="product-grid">
            </div>
    </main>

    <div id="carrinhoOverlay" class="overlay" onclick="fecharCarrinho()"></div>
    <aside id="carrinhoLateral" class="cart-sidebar">
        <div class="cart-header">
            <h3>Sua Sacola</h3>
            <button class="close-btn" onclick="fecharCarrinho()">&times;</button>
        </div>
        <div id="itensCarrinho" class="cart-body"></div>
        <div class="cart-footer">
            <div class="total-container">
                <span>Subtotal</span>
                <span id="totalCarrinho">R$ 0,00</span>
            </div>
            <button class="btn-checkout" onclick="abrirCheckout()">FINALIZAR COMPRA</button>
        </div>
    </aside>

    <div id="checkoutModal" class="checkout-overlay">
        <div class="checkout-card">
            <h2>Pagamento Seguro</h2>
            <form onsubmit="processarPagamento(event)">
                <div class="input-group">
                    <label>Número do Cartão</label>
                    <input type="text" placeholder="0000 0000 0000 0000" required>
                </div>
                <div class="form-row">
                    <div class="input-group">
                        <label>Validade</label>
                        <input type="text" placeholder="MM/AA" required>
                    </div>
                    <div class="input-group">
                        <label>CVV</label>
                        <input type="text" placeholder="123" required>
                    </div>
                </div>
                <button type="submit" class="btn-pay">CONFIRMAR PAGAMENTO</button>
                <button type="button" class="btn-cancel" onclick="fecharCheckout()">Cancelar</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
